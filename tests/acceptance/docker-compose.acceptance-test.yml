services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: local
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U local -d testdb']
      interval: 5s
      timeout: 3s
      retries: 20